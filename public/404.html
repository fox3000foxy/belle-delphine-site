<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Belle Delphine</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu',
          'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        background: linear-gradient(135deg, #feb3ce 0%, #fed47c 50%, #fe9e73 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 32px;
        padding: 60px 40px;
        text-align: center;
        max-width: 600px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      }

      h1 {
        font-size: 8rem;
        font-weight: 900;
        background: linear-gradient(135deg, #feb3ce 0%, #fe9e73 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 20px;
        line-height: 1;
      }

      h2 {
        font-size: 2rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 15px;
      }

      p {
        font-size: 1.1rem;
        color: #666;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .button {
        display: inline-block;
        padding: 15px 40px;
        font-size: 1.1rem;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #feb3ce 0%, #fe9e73 100%);
        border-radius: 50px;
        text-decoration: none;
        box-shadow: 0 8px 25px rgba(254, 179, 206, 0.4);
        transition: all 0.3s ease;
      }

      .button:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 35px rgba(254, 179, 206, 0.5);
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 5rem;
        }

        h2 {
          font-size: 1.5rem;
        }

        .container {
          padding: 40px 30px;
        }
      }
    </style>
    <script>
      // Redirect to React app for proper routing
      window.location.href = '/';
    </script>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Oops! Page Not Found</h2>
      <p>
        The page you're looking for seems to have disappeared into the void. Don't worry, even the best
        cosplayers lose their props sometimes! 🎭
      </p>
      <a href="/" class="button">Go Home</a>
    </div>
  </body>
</html>
